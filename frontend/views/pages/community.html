<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="icon" sizes="16x16 32x32 48x48" type="image/png" href="/frontend/public/assets/imgs/Logo.svg" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <link rel="stylesheet" type="text/css"
    href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css" />

  <link rel="stylesheet" type="text/css"
    href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/fill/style.css" />

  <link rel="stylesheet" href="/frontend/public/assets/styles/main.css" />

  <link rel="stylesheet" href="/frontend/views/components/styles/community.css" />

  <title>GameWired | Comunidade</title>
</head>

<body>
  <div id="header"></div>

  <div class="create-post">
    <div class="modal myModal">
      <div class="modal-content">
        <form id="form" method="post" class="postForm">
          <h3>Faça sua postagem na comunidade!</h3>
          <div class="titleCatg">
            <textarea name="title" class="title" placeholder="Digite o título do post..."
              id="titulo_postagem"></textarea>
            <select name="" class="postCategoria" id="categoria_postagem">
              <option value=""></option>
            </select>
          </div>
          <textarea name="subject" class="subject" placeholder="Digite o assunto do post..."
            id="conteudo_postagem"></textarea>
          <input type="file" id="foto_postagem" accept="image/*">

          <div class="formButtons">
            <button type="submit" class="sentPost">Enviar</button>
            <button type="button" class="closeModal">Cancelar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <main id="community">
    <section class="container__community">
      <aside class="left">
        <div class="profile">
          <h3 id="CommunityLoggedOff">Cadastre-se ou faça o login para postar na comunidade!</h3>

          <div id="CommunityLoggedIn" class="infos hidden">
            <div class="user-img">
              <img id="foto_perfil" class="foto-perfil" src="https://res.cloudinary.com/dtno5yrwl/image/upload/v1776181814/user-default_gcbfvc.jpg"
                alt="Foto de Perfil" />
            </div>
            <div class="user-info">
              <h4 id="nome_usuario"></h4>
              <button id="abrirPerfil" class="community-button openProfile">Meu Perfil</button>
              <button class="community-button openModal">Criar Publicação</button>
            </div>
          </div>
        </div>

        <div class="community-select">
          <div id="catg-select">
            <p>Selecione um jogo para filtrar:</p>
            <div class="community-filter">
              <select name="" class="" id="select-button">
                <option value="">Selecione...</option>
              </select>

              <button id="filtrar">Filtrar</button>
            </div>
          </div>
        </div>
      </aside>

      <section class="middle">
        <div id="postsContainer"></div>
        <div id="commentsContainer"></div>
      </section>
    </section>
  </main>

  <div id="footer"></div>

  <script src="/frontend/views/components/scripts/community.js" defer></script>
  <script src="/frontend/views/components/global/global-js/global-footer-header.js"></script>
  <script src="/frontend/public/assets/scripts/_temas.js"></script>
  <script src="/frontend/public/assets/scripts/_navBar.js"></script>

</body>

</html>
